server:
  port: 8080

spring:
  application:
    name: chainsentinel-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/chainsentinel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 2.0

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level service=${spring.application.name} requestId=%X{requestId:-} thread=%thread logger=%logger{36} message=%msg%n"

bitcoin:
  rpc-url: ${BITCOIN_RPC_URL:http://127.0.0.1:18443}
  rpc-user: ${BITCOIN_RPC_USER:}
  rpc-password: ${BITCOIN_RPC_PASSWORD:}
  rpc-timeout: ${BITCOIN_RPC_TIMEOUT:10}
  network: ${BITCOIN_NETWORK:testnet4}
